# 1) WATCHLIST - keywords you want a heads-up about when they start spiking.
#    This is the whole product: pick keywords, get pinged when they break out.
#    Each (keyword × source) costs 1 API request per run. Keep it lean on the
#    free tier (100 req/month). Run `python -m trendwatch quota` to see the math.
watchlist:
  - keyword: "your brand or product"
    sources: ["google search"]
  - keyword: "a competitor"
    sources: ["google search"]
  # More examples (uncomment / edit):
  # - keyword: "ozempic"
  #   sources: ["google search", "tiktok"]
  # - keyword: "labubu"
  #   sources: ["amazon", "youtube"]

# Available sources:
#   google search · google images · google news · google shopping · youtube
#   tiktok · reddit · amazon · wikipedia · news volume · news sentiment
#   app downloads · npm · steam

# 2) BREAKOUT detection - when does a watched keyword count as "breaking out"?
breakout:
  period: "7D"            # window to measure growth over (7D, 14D, 30D, 1M, 3M, ...)
  threshold_pct: 50       # alert when growth over `period` is >= this %
  also_periods: ["1M", "3M"]   # shown for context in the alert (no extra quota)

# 3) REPORTS - the shareable artifacts TrendWatch writes back to your repo.
report:
  update_readme: true     # keep a live trend dashboard in your README
  write_markdown: true    # save reports/latest.md + a dated archive each run

# 4) SCHEDULE - set the actual cron in .github/workflows/trendwatch.yml.
#    Tip: on the free tier, a 2-keyword config can run daily (~60/month). For
#    hourly checks or a bigger watchlist, upgrade at https://trendsmcp.ai/pricing
