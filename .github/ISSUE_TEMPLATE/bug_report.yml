name: 🐛 Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: dropdown
    id: where
    attributes:
      label: Where did it happen?
      options:
        - GitHub Actions (scheduled/manual run)
        - Local run (python -m trendwatch)
        - A notification channel (Slack/Discord/Telegram/email)
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste the Actions log or terminal output. ⚠️ Remove any API keys or webhook URLs first.
      render: shell
  - type: input
    id: config
    attributes:
      label: config.yml (sources/feeds you used)
      placeholder: "e.g. watchlist: nike (google search); discovery: Google Trends"
